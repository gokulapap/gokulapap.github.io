<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="devops" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square matches the site background -->
  <rect width="64" height="64" rx="14" fill="#05070c"/>

  <!-- Classic DevOps infinity loop, drawn as a single continuous path
       so the gradient stroke renders end-to-end without seams. -->
  <path
    d="M 32 32
       C 28 23 14 23 14 32
       C 14 41 28 41 32 32
       C 36 23 50 23 50 32
       C 50 41 36 41 32 32 Z"
    fill="none"
    stroke="url(#devops)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
